version: "2"

linters:
  default: all
  disable:
  - containedctx
  - cyclop
  - depguard
  - dogsled
  - dupl
  - dupword
  - err113
  - exhaustive
  - exhaustruct
  - funcorder
  - funlen
  - gocognit
  - goconst
  - gocyclo
  - gomodguard
  - interfacebloat
  - ireturn
  - lll
  - maintidx
  - mnd
  - nestif
  - nilnil
  - nlreturn
  - unparam
  - varnamelen
  - wrapcheck
  - wsl
  - wsl_v5
  settings:
    gocritic:
      disabled-checks:
      - regexpMust
    gosec:
      config:
        G301: "0755"
        G302: "0644"
        G306: "0644"
      excludes:
      - G204
      - G304
    govet:
      enable-all: true
      disable:
      - fieldalignment
      settings:
        shadow:
          strict: true
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      enable-all-rules: true
      rules:
      - name: add-constant
        disabled: true
      - name: argument-limit
        disabled: true
      - name: cognitive-complexity
        disabled: true
      - name: confusing-naming
        disabled: true
      - name: confusing-results
        disabled: true
      - name: cyclomatic
        disabled: true
      - name: dot-imports
        arguments:
        - allowed-packages:
          - github.com/onsi/ginkgo/v2
          - github.com/onsi/gomega
      - name: enforce-switch-style
        disabled: true
      - name: flag-parameter
        disabled: true
      - name: function-length
        disabled: true
      - name: function-result-limit
        disabled: true
      - name: line-length-limit
        disabled: true
      - name: max-public-structs
        disabled: true
      - name: nested-structs
        disabled: true
      - name: package-comments
        disabled: true
      - name: struct-tag
        arguments:
        - mapstructure,omitzero,remain
        - yaml,omitzero,remain
      - name: unchecked-type-assertion
        arguments:
          - accept-ignored-assertion-result: true
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          xml: snake
          bson: snake
          avro: snake
          header: snake
          mapstructure: snake

formatters:
  enable:
  - gci
  - gofmt
  - gofumpt
  - goimports
  - golines
  - swaggo
  settings:
    gci:
      sections:
      - standard
      - default
      - localmodule
    gofumpt:
      extra-rules: true
    golines:
      max-len: 140
      shorten-comments: true
      reformat-tags: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  modules-download-mode: readonly
