name: Validate

on:
  pull_request:

jobs:
  validate:
    name: Validate
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: Run linter
      run: ./lint
    - name: Run tests
      run: ./test --ci
